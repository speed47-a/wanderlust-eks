# ============================================================
# frontend/frontend.yaml
#
# ⚠️  BEFORE APPLYING: Replace YOUR_ACCOUNT_ID with your
#     AWS account ID from terraform output (aws_account_id)
# ============================================================

# ── ConfigMap for Frontend ───────────────────────────────────
# The frontend needs to know where the backend API is.
# This is the VITE_API_PATH environment variable.
# ⚠️  UPDATE VITE_API_PATH after Phase 5 when you have your ALB URL
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: wanderlust
data:
  # This tells the React app where to send API requests
  # Update this to your ALB URL after Phase 5
  # Format: http://your-alb-url.us-east-1.elb.amazonaws.com
  VITE_API_PATH: "015331669121.dkr.ecr.us-east-1.amazonaws.com/wanderlust-frontend"

---
# ── Deployment ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: wanderlust
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # ⚠️  Replace YOUR_ACCOUNT_ID with your actual AWS account ID
          image: 015331669121.dkr.ecr.us-east-1.amazonaws.com/wanderlust-frontend:latest
          ports:
            - containerPort: 5173

          # Load frontend env vars from its own ConfigMap
          envFrom:
            - configMapRef:
                name: frontend-config

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 20

---
# ── Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: wanderlust
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      protocol: TCP

---
# ── HorizontalPodAutoscaler ──────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: wanderlust
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
