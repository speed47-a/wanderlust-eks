# ============================================================
# secret.yaml
# Secrets store sensitive data (passwords, tokens, keys).
# Unlike ConfigMaps, Secrets are base64 encoded and treated
# with more care by Kubernetes (not shown in logs, etc.)
#
# ⚠️  IMPORTANT: Do NOT commit this file to a public GitHub repo
#     In a real project you'd use AWS Secrets Manager or
#     Sealed Secrets. For this learning project it's fine.
#
# How to generate base64 values on Windows:
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-value"))
#
# The values below are already base64 encoded.
# Original JWT_SECRET is the one from your .env.docker file
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: wanderlust-secret
  namespace: wanderlust
type: Opaque
