# ============================================================
# nginx.conf
# Required for React Router to work correctly.
# Without this, refreshing any page except / gives a 404.
#
# "try_files" means:
#   1. Try to serve the exact file requested
#   2. Try to serve it as a directory
#   3. Fall back to index.html (React handles routing from there)
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
