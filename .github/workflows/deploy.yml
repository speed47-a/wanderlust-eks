# ============================================================
# .github/workflows/deploy.yml
#
# This pipeline runs automatically on every push to master.
#
# What it does:
#   1. Builds backend Docker image
#   2. Builds frontend Docker image
#   3. Pushes both to ECR with a unique tag (git commit SHA)
#   4. Updates the image tags in k8s manifests
#   5. Pushes updated manifests back to GitHub
#   6. ArgoCD detects the change and deploys automatically
# ============================================================

name: CI - Build and Push to ECR

# Trigger on every push to master branch
on:
  push:
    branches:
      - master

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/wanderlust-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/wanderlust-frontend

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest  # GitHub provides this runner for free

    steps:
      # ── Step 1: Checkout code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Configure AWS credentials ─────────────────
      # Uses the secrets we added to GitHub
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Step 3: Login to ECR ───────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Step 4: Build and push backend ────────────────────
      # Uses the git commit SHA as the image tag
      # This ensures every push creates a unique, traceable image
      - name: Build and push backend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          
          docker build -t $ECR_BACKEND:$IMAGE_TAG ./backend
          docker push $ECR_BACKEND:$IMAGE_TAG
          
          # Also tag as latest for convenience
          docker tag $ECR_BACKEND:$IMAGE_TAG $ECR_BACKEND:latest
          docker push $ECR_BACKEND:latest
          
          echo "BACKEND_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # ── Step 5: Build and push frontend ───────────────────
      - name: Build and push frontend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ALB_URL="http://k8s-wanderlu-wanderlu-f241083904-1240627941.us-east-1.elb.amazonaws.com"
          
          docker build \
            --no-cache \
            --build-arg VITE_API_PATH=$ALB_URL \
            -t $ECR_FRONTEND:$IMAGE_TAG \
            ./frontend
          
          docker push $ECR_FRONTEND:$IMAGE_TAG
          
          docker tag $ECR_FRONTEND:$IMAGE_TAG $ECR_FRONTEND:latest
          docker push $ECR_FRONTEND:latest
          
          echo "FRONTEND_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # ── Step 6: Update k8s manifests with new image tags ──
      # This is the GitOps part — we update the manifest in Git
      # ArgoCD will detect this change and deploy automatically
      - name: Update image tags in k8s manifests
        run: |
          # Update backend deployment with new image tag
          sed -i "s|$ECR_BACKEND:.*|$ECR_BACKEND:${{ github.sha }}|g" k8s/backend.yaml
          
          # Update frontend deployment with new image tag
          sed -i "s|$ECR_FRONTEND:.*|$ECR_FRONTEND:${{ github.sha }}|g" k8s/frontend.yaml

      # ── Step 7: Commit and push updated manifests ─────────
      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/backend.yaml k8s/frontend.yaml
          
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/speed47-a/wanderlust-eks.git
          git push

